<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>The Plumb Line — Group Chats</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --gold:#C9A84C;--gold-light:#E8D48A;--gold-dark:#9A7B2F;
      --black:#1A1A1A;--off-black:#2C2C2C;
      --white:#FFFFFF;--off-white:#F8F6F1;--stone:#EDE9E0;
      --border:#D6CEB8;--text-primary:#1A1A1A;--text-muted:#A89F8C;
      --header-height:58px;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--off-white);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Georgia,sans-serif;color:var(--text-primary);}

    /* LOADING */
    #loading{position:fixed;inset:0;background:var(--black);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
    #loading.hidden{display:none;}
    .load-sym{font-size:40px;color:var(--gold);}
    .load-txt{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);}

    /* AUTH GATE */
    #auth-gate{position:fixed;inset:0;background:var(--black);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px;}
    #auth-gate.show{display:flex;}
    .gate-icon{font-size:48px;}
    .gate-title{font-size:20px;font-weight:600;color:var(--white);font-family:Georgia,serif;}
    .gate-sub{font-size:13px;color:var(--text-muted);text-align:center;line-height:1.6;}
    .gate-btn{padding:12px 28px;background:var(--gold);border:none;border-radius:8px;font-size:13px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--black);cursor:pointer;margin-top:8px;}

    /* APP SHELL */
    #app{display:none;flex-direction:column;height:100vh;}
    #app.show{display:flex;}

    /* HEADER */
    #header{background:var(--black);height:var(--header-height);display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0;border-bottom:2px solid var(--gold-dark);}
    .header-logo{display:flex;align-items:baseline;gap:6px;}
    .header-logo .the{font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);}
    .header-logo .name{font-size:18px;font-weight:600;color:var(--white);font-family:Georgia,serif;}
    .header-logo .sym{font-size:14px;color:var(--gold);margin-left:4px;}
    #back-btn{background:transparent;border:1px solid rgba(201,168,76,0.3);border-radius:6px;padding:6px 12px;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);cursor:pointer;}

    /* ORG LIST VIEW */
    #orgs-view{flex:1;overflow-y:auto;}
    .orgs-header{padding:18px 18px 10px;background:var(--white);border-bottom:1px solid var(--border);}
    .orgs-header-title{font-size:20px;font-weight:600;font-family:Georgia,serif;}
    .orgs-header-sub{font-size:11px;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:3px;}
    .org-row{display:flex;align-items:center;gap:14px;padding:16px 18px;background:var(--white);border-bottom:1px solid var(--stone);cursor:pointer;transition:background 0.15s;}
    .org-row:active{background:var(--off-white);}
    .org-icon{width:52px;height:52px;border-radius:12px;background:var(--stone);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
    .org-info{flex:1;}
    .org-name{font-size:15px;font-weight:600;color:var(--text-primary);font-family:Georgia,serif;}
    .org-type{font-size:11px;color:var(--text-muted);letter-spacing:0.06em;margin-top:2px;}
    .org-preview{font-size:13px;color:var(--text-muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .org-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
    .org-time{font-size:10px;color:var(--text-muted);}
    .org-unread{width:20px;height:20px;border-radius:50%;background:var(--gold);color:var(--black);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}
    .org-pts{font-size:11px;color:var(--gold-dark);font-weight:600;}
    .orgs-empty{padding:48px 24px;text-align:center;color:var(--text-muted);font-size:14px;line-height:1.8;}
    .orgs-empty-icon{font-size:40px;margin-bottom:12px;}

    /* CHAT VIEW */
    #chat-view{position:fixed;inset:0;background:var(--off-white);z-index:50;display:none;flex-direction:column;}
    #chat-view.open{display:flex;}
    #chat-header{background:var(--black);height:var(--header-height);display:flex;align-items:center;gap:12px;padding:0 16px;flex-shrink:0;border-bottom:2px solid var(--gold-dark);}
    #chat-back{background:transparent;border:none;color:var(--gold);font-size:22px;cursor:pointer;padding:8px 4px;}
    #chat-org-icon{width:36px;height:36px;border-radius:9px;background:var(--off-black);border:1px solid var(--gold-dark);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    #chat-org-info{flex:1;}
    #chat-org-name{font-size:15px;font-weight:600;color:var(--white);font-family:Georgia,serif;}
    #chat-org-type{font-size:10px;color:var(--gold);letter-spacing:0.1em;text-transform:uppercase;}
    #chat-pts-badge{font-size:11px;color:var(--gold-dark);font-weight:600;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.3);border-radius:999px;padding:3px 10px;flex-shrink:0;}

    #chat-messages{flex:1;overflow-y:auto;padding:12px 16px;-webkit-overflow-scrolling:touch;}
    .chat-date-divider{text-align:center;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);margin:14px 0 8px;}

    /* Messages */
    .msg-wrap{display:flex;gap:9px;margin-bottom:10px;align-items:flex-end;}
    .msg-wrap.mine{flex-direction:row-reverse;}
    .msg-sender-avatar{width:30px;height:30px;border-radius:50%;background:var(--stone);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--gold-dark);font-family:Georgia,serif;flex-shrink:0;}
    .msg-content{display:flex;flex-direction:column;max-width:72%;}
    .msg-wrap.mine .msg-content{align-items:flex-end;}
    .msg-sender-name{font-size:10px;color:var(--text-muted);margin-bottom:3px;letter-spacing:0.05em;}
    .msg-bubble{padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.5;word-break:break-word;}
    .msg-wrap.mine .msg-bubble{background:var(--gold);color:var(--black);border-bottom-right-radius:4px;}
    .msg-wrap.theirs .msg-bubble{background:var(--white);color:var(--text-primary);border:1px solid var(--border);border-bottom-left-radius:4px;}
    .msg-time{font-size:10px;color:var(--text-muted);margin-top:3px;}

    .chat-empty{padding:48px 24px;text-align:center;color:var(--text-muted);font-size:14px;line-height:1.8;}
    .chat-empty-icon{font-size:40px;margin-bottom:12px;}

    /* Input */
    #chat-input-wrap{background:var(--white);border-top:1px solid var(--border);padding:10px 14px;display:flex;align-items:flex-end;gap:10px;flex-shrink:0;padding-bottom:max(10px,env(safe-area-inset-bottom));}
    #chat-input{flex:1;background:var(--off-white);border:1px solid var(--border);border-radius:22px;padding:10px 16px;font-size:15px;color:var(--text-primary);outline:none;resize:none;max-height:120px;font-family:inherit;line-height:1.4;}
    #chat-input:focus{border-color:var(--gold);}
    #chat-send{width:42px;height:42px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:all 0.2s;}
    #chat-send:active{transform:scale(0.93);}
    #chat-send:disabled{opacity:0.4;}

    /* Typing indicator */
    .typing-wrap{display:flex;gap:9px;align-items:flex-end;margin-bottom:10px;}
    .typing-bubble{padding:10px 14px;background:var(--white);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:4px;display:flex;gap:4px;align-items:center;}
    .typing-dot{width:7px;height:7px;border-radius:50%;background:var(--text-muted);animation:typingBounce 1.2s infinite;}
    .typing-dot:nth-child(2){animation-delay:0.2s;}
    .typing-dot:nth-child(3){animation-delay:0.4s;}
    @keyframes typingBounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

    /* ORG INFO PANEL */
    #info-panel{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:60;display:none;align-items:flex-end;}
    #info-panel.open{display:flex;}
    #info-sheet{background:var(--white);width:100%;border-radius:20px 20px 0 0;padding:24px 20px 40px;max-height:80vh;overflow-y:auto;}
    .info-org-icon{font-size:40px;text-align:center;margin-bottom:10px;}
    .info-org-name{font-size:20px;font-weight:600;font-family:Georgia,serif;text-align:center;}
    .info-org-type{font-size:11px;color:var(--text-muted);letter-spacing:0.12em;text-transform:uppercase;text-align:center;margin-top:4px;margin-bottom:20px;}
    .info-stat-row{display:flex;gap:10px;margin-bottom:20px;}
    .info-stat{flex:1;background:var(--stone);border-radius:10px;padding:12px 8px;text-align:center;}
    .info-stat-num{font-size:20px;font-weight:700;color:var(--gold);font-family:Georgia,serif;}
    .info-stat-label{font-size:9px;color:var(--text-muted);letter-spacing:0.12em;text-transform:uppercase;margin-top:2px;}
    .info-close{width:100%;padding:13px;background:transparent;border:1px solid var(--border);border-radius:8px;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;}

    /* TOAST */
    #toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--off-black);color:var(--gold-light);padding:10px 20px;border-radius:999px;font-size:13px;border:1px solid var(--gold-dark);opacity:0;transition:all 0.3s ease;z-index:500;white-space:nowrap;}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  </style>
</head>
<body>

<div id="loading"><div class="load-sym">⧖</div><div class="load-txt">Group Chats</div></div>

<div id="auth-gate">
  <div class="gate-icon">🔒</div>
  <div class="gate-title">Sign In Required</div>
  <div class="gate-sub">Please sign in to the main app<br>to access group chats.</div>
  <button class="gate-btn" onclick="window.location.href='index.html'">Go to App</button>
</div>

<div id="app">
  <div id="header">
    <div class="header-logo">
      <span class="the">The</span><span class="name">Plumb Line</span><span class="sym">⧖</span>
    </div>
    <button id="back-btn" onclick="window.location.href='index.html'">← App</button>
  </div>

  <div id="orgs-view">
    <div class="orgs-header">
      <div class="orgs-header-title">Group Chats</div>
      <div class="orgs-header-sub">Your lodge organizations</div>
    </div>
    <div id="orgs-list"></div>
  </div>
</div>

<!-- CHAT VIEW -->
<div id="chat-view">
  <div id="chat-header">
    <button id="chat-back" onclick="closeChat()">‹</button>
    <div id="chat-org-icon">🏛️</div>
    <div id="chat-org-info">
      <div id="chat-org-name">Organization</div>
      <div id="chat-org-type">Group Chat</div>
    </div>
    <button id="chat-pts-badge" onclick="openInfoPanel()">ℹ️ Info</button>
  </div>
  <div id="chat-messages"></div>
  <div id="chat-input-wrap">
    <textarea id="chat-input" placeholder="Message the group..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="chat-send" onclick="sendGroupMessage()">➤</button>
  </div>
</div>

<!-- ORG INFO PANEL -->
<div id="info-panel" onclick="closeInfoOutside(event)">
  <div id="info-sheet">
    <div class="info-org-icon" id="info-icon">🏛️</div>
    <div class="info-org-name" id="info-name"></div>
    <div class="info-org-type" id="info-type"></div>
    <div class="info-stat-row">
      <div class="info-stat"><div class="info-stat-num" id="info-pts">0</div><div class="info-stat-label">Group Points</div></div>
      <div class="info-stat"><div class="info-stat-num" id="info-msgs">0</div><div class="info-stat-label">Messages</div></div>
    </div>
    <div id="info-desc" style="font-size:14px;color:var(--text-muted);line-height:1.6;margin-bottom:20px;display:none;"></div>
    <button class="info-close" onclick="closeInfoPanel()">Close</button>
  </div>
</div>

<div id="toast"></div>

<script>
(function(){
  const SUPABASE_URL='https://tbzqkbnjmuftxupnwnqw.supabase.co';
  const SUPABASE_KEY='sb_publishable_DKJiq9QnFoJlgglOJBZRYQ_n58Uq2J1';
  const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

  let currentUser=null,currentOrg=null,realtimeSub=null;
  let allProfiles={};
  let msgCounts={};

  const orgTypeMap={
    blue_lodge:{icon:'🏛️',label:'Blue Lodge'},
    scottish_rite:{icon:'⭐',label:'Scottish Rite Valley'},
    shrine:{icon:'🌙',label:'Shrine Club'},
    york_rite:{icon:'✝️',label:'York Rite'},
    order_eastern_star:{icon:'🌟',label:'Order of the Eastern Star'},
    demolay:{icon:'🔹',label:'DeMolay'},
    rainbow:{icon:'🌈',label:'Rainbow Girls'},
    other:{icon:'📌',label:'Masonic Body'}
  };

  /* ── BOOT ── */
  async function boot(){
    const{data:{session}}=await sb.auth.getSession();
    document.getElementById('loading').classList.add('hidden');
    if(!session){document.getElementById('auth-gate').classList.add('show');return;}
    currentUser=session.user;
    document.getElementById('app').classList.add('show');
    await loadOrgs();
  }

  /* ── ORG LIST ── */
  async function loadOrgs(){
    const{data:orgs,error}=await sb.from('organizations').select('*').order('name');
    if(error){console.error(error);return;}
    if(!orgs||!orgs.length){
      document.getElementById('orgs-list').innerHTML='<div class="orgs-empty"><div class="orgs-empty-icon">🏛️</div>No organizations yet.<br>Ask your admin to create one.</div>';
      return;
    }

    // Load last message for each org
    const lastMsgs={};
    for(const org of orgs){
      const{data:msgs}=await sb.from('group_messages').select('*').eq('org_id',org.id).order('created_at',{ascending:false}).limit(1);
      if(msgs&&msgs.length)lastMsgs[org.id]=msgs[0];
      // Count total messages
      const{count}=await sb.from('group_messages').select('*',{count:'exact',head:true}).eq('org_id',org.id);
      msgCounts[org.id]=count||0;
    }

    // Load sender profiles
    const senderIds=[...new Set(Object.values(lastMsgs).map(m=>m.sender_id))];
    if(senderIds.length){
      const{data:profiles}=await sb.from('profiles').select('id,full_name').in('id',senderIds);
      (profiles||[]).forEach(p=>allProfiles[p.id]=p);
    }

    const list=document.getElementById('orgs-list');
    list.innerHTML=orgs.map(org=>{
      const t=orgTypeMap[org.org_type]||orgTypeMap.other;
      const last=lastMsgs[org.id];
      const senderName=last?getFirstName(allProfiles[last.sender_id]?.full_name||'Brother'):'';
      const preview=last?(senderName+': '+last.content.slice(0,35)+(last.content.length>35?'...':'')):'No messages yet — start the conversation';
      const timeStr=last?timeAgo(last.created_at):'';
      return`<div class="org-row" onclick="openChat('${org.id}')">
        <div class="org-icon">${t.icon}</div>
        <div class="org-info">
          <div class="org-name">${esc(org.name)}</div>
          <div class="org-type">${t.label}</div>
          <div class="org-preview">${esc(preview)}</div>
        </div>
        <div class="org-meta">
          ${timeStr?`<div class="org-time">${timeStr}</div>`:''}
          <div class="org-pts">${(org.points||0)} pts</div>
        </div>
      </div>`;
    }).join('');
  }

  /* ── OPEN CHAT ── */
  window.openChat=async function(orgId){
    const{data:org}=await sb.from('organizations').select('*').eq('id',orgId).single();
    if(!org)return;
    currentOrg=org;
    const t=orgTypeMap[org.org_type]||orgTypeMap.other;
    document.getElementById('chat-org-icon').textContent=t.icon;
    document.getElementById('chat-org-name').textContent=org.name;
    document.getElementById('chat-org-type').textContent=t.label;
    document.getElementById('chat-pts-badge').textContent=`${(org.points||0)} pts`;
    document.getElementById('chat-messages').innerHTML='<div class="chat-empty"><div class="chat-empty-icon" style="font-size:24px;">⏳</div>Loading messages...</div>';
    document.getElementById('chat-view').classList.add('open');
    await loadGroupMessages(orgId);
    subscribeToGroup(orgId);
    document.getElementById('chat-input').focus();
  };

  window.closeChat=function(){
    document.getElementById('chat-view').classList.remove('open');
    if(realtimeSub){sb.removeChannel(realtimeSub);realtimeSub=null;}
    currentOrg=null;
    loadOrgs();
  };

  /* ── LOAD MESSAGES ── */
  async function loadGroupMessages(orgId){
    const{data,error}=await sb.from('group_messages').select('*').eq('org_id',orgId).order('created_at',{ascending:true});
    if(error){console.error(error);return;}

    // Load any missing profiles
    const senderIds=[...new Set((data||[]).map(m=>m.sender_id).filter(id=>!allProfiles[id]))];
    if(senderIds.length){
      const{data:profiles}=await sb.from('profiles').select('id,full_name').in('id',senderIds);
      (profiles||[]).forEach(p=>allProfiles[p.id]=p);
    }

    renderMessages(data||[]);
  }

  function renderMessages(messages){
    const el=document.getElementById('chat-messages');
    if(!messages.length){
      el.innerHTML='<div class="chat-empty"><div class="chat-empty-icon">🤝</div>No messages yet.<br>Be the first to greet your Brothers!</div>';
      return;
    }

    let html='',lastDate='';
    messages.forEach(msg=>{
      const mine=msg.sender_id===currentUser.id;
      const d=new Date(msg.created_at),dateStr=d.toDateString();
      if(dateStr!==lastDate){
        lastDate=dateStr;
        const label=dateStr===new Date().toDateString()?'Today':d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
        html+=`<div class="chat-date-divider">${label}</div>`;
      }
      const senderName=allProfiles[msg.sender_id]?.full_name||'Brother';
      const initials=getInitials(senderName);
      const timeStr=d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      html+=`<div class="msg-wrap ${mine?'mine':'theirs'}">
        ${!mine?`<div class="msg-sender-avatar">${initials}</div>`:''}
        <div class="msg-content">
          ${!mine?`<div class="msg-sender-name">${esc(getFirstName(senderName))}</div>`:''}
          <div class="msg-bubble">${esc(msg.content)}</div>
          <div class="msg-time">${timeStr}</div>
        </div>
        ${mine?`<div class="msg-sender-avatar" style="background:rgba(201,168,76,0.15);border-color:var(--gold-dark);">${initials}</div>`:''}
      </div>`;
    });

    el.innerHTML=html;
    el.scrollTop=el.scrollHeight;
  }

  /* ── SEND MESSAGE ── */
  window.sendGroupMessage=async function(){
    if(!currentOrg||!currentUser)return;
    const input=document.getElementById('chat-input');
    const content=input.value.trim();
    if(!content)return;
    input.value='';
    autoResize(input);
    document.getElementById('chat-send').disabled=true;
    const{error}=await sb.from('group_messages').insert({org_id:currentOrg.id,sender_id:currentUser.id,content});
    document.getElementById('chat-send').disabled=false;
    if(error){showToast('Could not send message.');console.error(error);}
  };

  window.handleKey=function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendGroupMessage();}};
  window.autoResize=function(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';};

  /* ── REALTIME ── */
  function subscribeToGroup(orgId){
    if(realtimeSub)sb.removeChannel(realtimeSub);
    realtimeSub=sb.channel('group-'+orgId)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'group_messages',filter:`org_id=eq.${orgId}`},async payload=>{
        const msg=payload.new;
        if(!allProfiles[msg.sender_id]){
          const{data}=await sb.from('profiles').select('id,full_name').eq('id',msg.sender_id).single();
          if(data)allProfiles[data.id]=data;
        }
        await loadGroupMessages(orgId);
      })
      .subscribe();
  }

  /* ── INFO PANEL ── */
  window.openInfoPanel=async function(){
    if(!currentOrg)return;
    const t=orgTypeMap[currentOrg.org_type]||orgTypeMap.other;
    document.getElementById('info-icon').textContent=t.icon;
    document.getElementById('info-name').textContent=currentOrg.name;
    document.getElementById('info-type').textContent=t.label;
    document.getElementById('info-pts').textContent=(currentOrg.points||0).toLocaleString();
    document.getElementById('info-msgs').textContent=(msgCounts[currentOrg.id]||0).toLocaleString();
    const descEl=document.getElementById('info-desc');
    if(currentOrg.description){descEl.textContent=currentOrg.description;descEl.style.display='block';}
    else descEl.style.display='none';
    document.getElementById('info-panel').classList.add('open');
  };

  window.closeInfoPanel=function(){document.getElementById('info-panel').classList.remove('open');};
  window.closeInfoOutside=function(e){if(e.target===document.getElementById('info-panel'))closeInfoPanel();};

  /* ── UTILS ── */
  function getInitials(name){if(!name)return'?';return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
  function getFirstName(name){if(!name)return'Brother';return name.split(' ')[0];}
  function esc(str){if(!str)return'';return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function timeAgo(ts){
    const diff=Date.now()-new Date(ts).getTime(),mins=Math.floor(diff/60000);
    if(mins<1)return'Just now';if(mins<60)return mins+'m ago';
    const hrs=Math.floor(mins/60);if(hrs<24)return hrs+'h ago';
    const days=Math.floor(hrs/24);if(days===1)return'Yesterday';return days+'d ago';
  }

  let toastTimer;
  window.showToast=function(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2400);};

  boot();
})();
</script>
</body>
</html>
